# 超级赞独立入口(2026-07 起不再借万里招标的 nginx):
# 公网 → 云端 frps(:80/:443) → frpc 隧道 → 本 nginx(8880/8443)
# TLS 在这里终结,证书在 ../certs(部署机本地,不入库;续期见 renew-cert.sh)

map $http_upgrade $superz_connection {
    default upgrade;
    ""      close;
}

server {
    listen 80;
    server_name aikas.com.cn chaojizan.cc www.chaojizan.cc;

    # 证书签发/续期挑战(certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name aikas.com.cn;

    ssl_certificate     /etc/nginx/certs/aikas/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/aikas/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10m;

    location / {
        proxy_pass http://superz-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket(商家听单/骑手推送)升级头;长连接读超时放宽到 1h
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $superz_connection;
        proxy_read_timeout 3600s;
    }
}

