# 超级赞公网入口:公网 → 云端 frps(:80/:443) → frpc 隧道 → 本 nginx(8880/8443)
# TLS 在这里终结,证书在 ../certs(部署机本地,不入库;续期见 renew-cert.sh)。
# 历史域名的 server 块放服务器本地 legacy-*.conf(rsync 排除,不入库)。

map $http_upgrade $superz_connection {
    default upgrade;
    ""      close;
}

server {
    listen 80;
    server_name _;

    # 证书签发/续期挑战(certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

