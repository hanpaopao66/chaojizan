services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: superz
      POSTGRES_PASSWORD: superz
      POSTGRES_DB: superz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superz"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./server
    environment:
      DATABASE_URL: postgresql+asyncpg://superz:superz@db:5432/superz
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
